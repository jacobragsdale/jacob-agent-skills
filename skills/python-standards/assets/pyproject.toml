# Merge these sections into the repository's pyproject.toml.

[tool.ruff]
line-length = 200
target-version = "py311"
required-version = ">=0.15.22"
force-exclude = true
show-fixes = true
unsafe-fixes = false

[tool.ruff.lint]
select = [
    "E4",  # Keep imports valid and at the top level.
    "E7",  # Reject ambiguous statements and comparisons.
    "E9",  # Report fatal file-read errors.
    "F",  # Catch undefined names, unused imports, and dead assignments.
    "I",  # Keep imports ordered and grouped consistently.
    "UP",  # Use syntax appropriate for the target Python version.
    "B",  # Catch likely bugs and hazardous design patterns.
    "SIM",  # Replace needlessly complex control flow.
    "C4",  # Remove wasteful collection constructions.
    "RUF",  # Apply additional correctness and modernization checks.
    "ANN001",  # Require annotations for named function arguments.
    "ANN002",  # Require annotations for *args.
    "ANN003",  # Require annotations for **kwargs.
    "ANN201",  # Require return annotations on public functions.
    "ANN202",  # Require return annotations on private functions.
    "ANN204",  # Require return annotations on special methods.
    "ANN205",  # Require return annotations on static methods.
    "ANN206",  # Require return annotations on class methods.
    "BLE",  # Reject overly broad exception handlers.
    "DTZ",  # Prevent naive datetime construction.
    "LOG",  # Enforce safe logger and exception usage.
    "G",  # Require lazy, valid log formatting.
    "ARG",  # Expose unused parameters.
    "PIE",  # Catch miscellaneous unnecessary or error-prone code.
    "PGH",  # Reject blanket ignores and common unsafe shortcuts.
    "RSE",  # Remove unnecessary syntax when raising exceptions.
    "RET502",  # Reject implicit None returns in functions that return values.
    "RET503",  # Require an explicit final return in value-returning functions.
    "TRY004",  # Raise TypeError for invalid argument types.
    "TRY201",  # Use a bare raise when re-raising the current exception.
    "TRY203",  # Remove handlers that only re-raise immediately.
    "TRY401",  # Do not repeat the exception in logging.exception messages.
    "PLW",  # Catch suspicious control flow and API usage.
    "C90",  # Limit cyclomatic complexity.
    "PERF",  # Flag avoidable allocations and slow loop patterns.
    "ASYNC",  # Catch blocking calls and async misuse.
    "FAST",  # Validate route declarations and dependency annotations.
    "PD",  # Enforce safer and more efficient dataframe idioms.
]
ignore = [
    "ASYNC109",  # Allow deliberate timeout parameters in async APIs.
]

[tool.ruff.lint.isort]
split-on-trailing-comma = false  # Do not preserve comma-forced import line breaks.

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.format]
docstring-code-format = true
skip-magic-trailing-comma = true  # Collapse comma-forced multiline constructs when they fit.

[tool.basedpyright]
pythonVersion = "3.11"
venvPath = "."
venv = ".venv"
typeCheckingMode = "recommended"
failOnWarnings = true
exclude = [".venv"]
