# Merge these sections into the repository's pyproject.toml.

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E4", "E7", "E9",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
    "C4",
    "RUF",
]

[tool.basedpyright]
pythonVersion = "3.11"
venvPath = "."
venv = ".venv"
typeCheckingMode = "recommended"
failOnWarnings = true
exclude = [".venv"]
